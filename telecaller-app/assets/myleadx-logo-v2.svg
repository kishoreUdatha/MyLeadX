<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main Gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background Rounded Square -->
  <rect x="20" y="20" width="472" height="472" rx="90" fill="url(#mainGrad)" filter="url(#shadow)"/>

  <!-- Inner glow effect -->
  <rect x="40" y="40" width="432" height="432" rx="75" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.2"/>

  <!-- Letter M - Bold Modern -->
  <path d="M100 380 L100 160 L160 160 L256 290 L352 160 L412 160 L412 380 L352 380 L352 260 L276 360 L236 360 L160 260 L160 380 Z"
        fill="#FFFFFF"/>

  <!-- Letter X - Stylized with gradient -->
  <g transform="translate(320, 80)">
    <path d="M0 0 L70 90 M70 0 L0 90"
          fill="none" stroke="url(#accentGrad)" stroke-width="24" stroke-linecap="round"/>
  </g>

  <!-- Subtle lead/arrow indicator -->
  <path d="M420 420 L450 390 L450 420 Z" fill="#FFFFFF" opacity="0.6"/>
</svg>
