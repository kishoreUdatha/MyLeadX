<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background Circle -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
  </defs>

  <!-- Main Circle Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)"/>

  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>

  <!-- Lead/Person Icon -->
  <circle cx="100" cy="70" r="22" fill="url(#iconGradient)"/>
  <path d="M60 130 Q60 100 100 100 Q140 100 140 130 L140 145 Q140 155 130 155 L70 155 Q60 155 60 145 Z" fill="url(#iconGradient)"/>

  <!-- Check Mark (Lead Converted) -->
  <circle cx="135" cy="65" r="18" fill="#10B981"/>
  <path d="M127 65 L133 72 L145 58" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Signal/Call Lines -->
  <path d="M155 100 Q165 100 165 110" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M160 95 Q175 95 175 115" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M165 90 Q185 90 185 120" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
</svg>
