name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  APP_NAME: 'voicebridge'

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.com/api

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Check DigitalOcean authentication
        run: doctl account get

      - name: Check if app exists
        id: check-app
        run: |
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header 2>/dev/null | grep ${{ env.APP_NAME }} | awk '{print $1}' || echo "")
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT
          if [ -n "$APP_ID" ]; then
            echo "app_exists=true" >> $GITHUB_OUTPUT
          else
            echo "app_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create App (First deployment)
        if: steps.check-app.outputs.app_exists == 'false'
        run: |
          echo "Creating new app..."
          doctl apps create --spec .do/app.yaml --wait
          echo "App created successfully!"

      - name: Update App Spec
        if: steps.check-app.outputs.app_exists == 'true'
        run: |
          echo "Updating app specification..."
          doctl apps update ${{ steps.check-app.outputs.app_id }} --spec .do/app.yaml

      - name: Deploy Application
        id: deploy
        run: |
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep ${{ env.APP_NAME }} | awk '{print $1}')
          echo "Deploying app: $APP_ID"
          doctl apps create-deployment $APP_ID --wait
          APP_URL=$(doctl apps get $APP_ID --format DefaultIngress --no-header)
          echo "app_url=https://$APP_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: https://$APP_URL"

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.deploy.outputs.app_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
