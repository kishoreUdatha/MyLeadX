name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com
  REGISTRY_NAME: voicebridge
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.com/api

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Login to Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build backend image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/api:${{ env.IMAGE_TAG }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/api:latest \
            -f backend/Dockerfile ./backend

      - name: Build frontend image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/web:${{ env.IMAGE_TAG }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/web:latest \
            -f frontend/Dockerfile ./frontend

      - name: Push backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/api:${{ env.IMAGE_TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/api:latest

      - name: Push frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/web:${{ env.IMAGE_TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_NAME }}/web:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Check if app exists
        id: check-app
        run: |
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header 2>/dev/null | grep voicebridge | awk '{print $1}' || echo "")
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT
          if [ -n "$APP_ID" ]; then
            echo "app_exists=true" >> $GITHUB_OUTPUT
          else
            echo "app_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create App
        if: steps.check-app.outputs.app_exists == 'false'
        run: doctl apps create --spec .do/app.yaml --wait

      - name: Update and Deploy App
        if: steps.check-app.outputs.app_exists == 'true'
        run: |
          doctl apps update ${{ steps.check-app.outputs.app_id }} --spec .do/app.yaml
          doctl apps create-deployment ${{ steps.check-app.outputs.app_id }} --wait

      - name: Get App URL
        id: get-url
        run: |
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep voicebridge | awk '{print $1}')
          APP_URL=$(doctl apps get $APP_ID --format DefaultIngress --no-header)
          echo "app_url=https://$APP_URL" >> $GITHUB_OUTPUT

    outputs:
      app_url: ${{ steps.get-url.outputs.app_url }}

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Wait for app
        run: sleep 30

      - name: Check API health
        run: |
          APP_URL="${{ needs.deploy.outputs.app_url }}"
          echo "Checking: $APP_URL/api/health"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/api/health" || echo "000")
          echo "Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed!"
          else
            echo "Health check failed: $HTTP_STATUS"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ needs.deploy.outputs.app_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image Tag: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Healthy" >> $GITHUB_STEP_SUMMARY
