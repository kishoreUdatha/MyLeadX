# DigitalOcean App Platform Specification
# Deploy with: doctl apps create --spec .do/app.yaml

name: voicebridge
region: blr  # Bangalore, India

# Alert policies
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

# Backend API Service (from Container Registry)
services:
  - name: api
    image:
      registry_type: DOCR
      registry: voicebridge
      repository: api
      tag: latest

    # Instance configuration
    instance_count: 1
    instance_size_slug: professional-xs  # 1 vCPU, 1GB RAM

    # HTTP configuration
    http_port: 8080

    # Routes
    routes:
      - path: /api
      - path: /socket.io

    # Health check
    health_check:
      http_path: /api/health
      initial_delay_seconds: 40
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3

    # Environment variables
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DEEPGRAM_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SARVAM_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ELEVENLABS_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: FRONTEND_URL
        value: ${APP_URL}
      - key: CORS_ORIGINS
        value: ${APP_URL}
      - key: DO_SPACES_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_BUCKET
        value: voicebridge-uploads
      - key: DO_SPACES_REGION
        value: blr1
      - key: DO_SPACES_ENDPOINT
        value: https://blr1.digitaloceanspaces.com
      # Telephony - Plivo
      - key: PLIVO_AUTH_ID
        scope: RUN_TIME
        type: SECRET
      - key: PLIVO_AUTH_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: PLIVO_PHONE_NUMBER
        scope: RUN_TIME
        type: SECRET
      # Telephony - Exotel
      - key: EXOTEL_SID
        scope: RUN_TIME
        type: SECRET
      - key: EXOTEL_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: EXOTEL_API_TOKEN
        scope: RUN_TIME
        type: SECRET
      # WhatsApp
      - key: WHATSAPP_ACCESS_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: WHATSAPP_PHONE_NUMBER_ID
        scope: RUN_TIME
        type: SECRET
      # Email SMTP
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_PASS
        scope: RUN_TIME
        type: SECRET
      # Razorpay Payments
      - key: RAZORPAY_KEY_ID
        scope: RUN_TIME
        type: SECRET
      - key: RAZORPAY_KEY_SECRET
        scope: RUN_TIME
        type: SECRET

    # Auto-scaling
    autoscaling:
      min_instance_count: 1
      max_instance_count: 10
      metrics:
        - type: CPU
          percent: 70

# Frontend Static Site
static_sites:
  - name: web
    github:
      repo: kishoreUdatha/VoiceBridge
      branch: main
      deploy_on_push: false
    source_dir: frontend
    build_command: npm ci && npm run build
    output_dir: dist

    # Environment variables for build
    envs:
      - key: VITE_API_URL
        value: ${api.PUBLIC_URL}/api
      - key: VITE_WS_URL
        value: ${api.PUBLIC_URL}

    # Routes (catch-all for SPA)
    routes:
      - path: /

    # Error document for SPA routing
    error_document: index.html
    catchall_document: index.html

# Jobs (database migration)
jobs:
  - name: db-migrate
    image:
      registry_type: DOCR
      registry: voicebridge
      repository: api
      tag: latest
    kind: PRE_DEPLOY

    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET

    run_command: npx prisma migrate deploy
